<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Закрывающий тег</title>
    <link rel="icon" href="./images/favicon.ico" sizes="any">
    <link rel="icon" href="./svg/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./images/favicon.png"> 
    <link rel="stylesheet" href="./fonts/fonts.css" />
    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/globals.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/animations.css" />
  </head>
  <body class="page">
    <header class="header">
      <div class="heading">
        <h1 class="title">&lt/html&gt</h1>
        <p class="title-text">закрывающий тег</p>
      </div>
    </header>
    <main>
      <article class="card">
        <h2 class="card-header">Фритрек и нулевой спринт: Подготовка к работе</h2>
        <picture>
          <source srcset="./images/original700.png" media="(width>375px)">
          <img class="card-image" src="./images/original375.png" alt="Картинка с машиной" loading="lazy">
        </picture>
        <p class="card-text">Это было самое начало пути. На этом этапе важно было проникнуться основами и настроиться на учёбу. И, возможно, подумать, как новые знания могут повлиять на ваше будущее.</p>
        <p class="card-text">Место для ваших воспоминаний о начале обучения.</p>
        <button class="card-button"><span class="button__text">Like</span></button>
      </article>
      <button class="save-button"><span class="button__text">Сохранить на память</span></button>
    </main>
    <script src="./scripts/like.js"></script>
  </body>
